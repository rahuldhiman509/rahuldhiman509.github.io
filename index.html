<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rahul Dhiman — Full-Stack & AI Engineer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --c-lime: #C8FF00;
      --c-pink: #FF2D9E;
      --c-cyan: #00E5FF;
      --c-orange: #FF6B2B;
      --c-purple: #7C3AED;
      --c-dark: #0A0A0F;
      --c-card: #12121A;
      --c-border: #1E1E2E;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--c-dark); color: #fff; font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
    h1, h2, h3 { font-family: 'Syne', sans-serif; }
    code, .mono { font-family: 'Space Mono', monospace; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--c-dark); }
    ::-webkit-scrollbar-thumb { background: var(--c-lime); border-radius: 2px; }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* Glow blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.12;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(32px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes marquee {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    .fade-up { animation: fadeUp 0.7s ease forwards; }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .delay-4 { animation-delay: 0.4s; }
    .delay-5 { animation-delay: 0.5s; }
    .opacity-0-start { opacity: 0; }

    .cursor-blink { animation: blink 1s step-end infinite; }
    .float { animation: float 4s ease-in-out infinite; }
    .spin-slow { animation: spin-slow 20s linear infinite; }

    .marquee-track { animation: marquee 24s linear infinite; display: flex; width: max-content; gap: 2rem; }
    .marquee-wrap { overflow: hidden; }

    /* Nav */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      backdrop-filter: blur(20px);
      background: rgba(10,10,15,0.85);
      border-bottom: 1px solid var(--c-border);
    }

    /* Cards */
    .card {
      background: var(--c-card);
      border: 1px solid var(--c-border);
      border-radius: 16px;
      transition: border-color 0.3s, transform 0.3s;
    }
    .card:hover { border-color: var(--c-lime); transform: translateY(-4px); }

    /* Gradient text */
    .grad-lime { background: linear-gradient(135deg, var(--c-lime), var(--c-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .grad-pink { background: linear-gradient(135deg, var(--c-pink), var(--c-orange)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .grad-purple { background: linear-gradient(135deg, var(--c-purple), var(--c-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    /* Skill badge */
    .skill-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(200,255,0,0.07);
      border: 1px solid rgba(200,255,0,0.18);
      color: var(--c-lime);
      border-radius: 999px;
      padding: 6px 16px;
      font-size: 13px;
      font-family: 'Space Mono', monospace;
      transition: background 0.2s, border-color 0.2s;
    }
    .skill-badge:hover { background: rgba(200,255,0,0.15); border-color: var(--c-lime); }

    /* Section tag */
    .section-tag {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--c-lime);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-tag::before { content: '//'; opacity: 0.4; }

    /* Button */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--c-lime);
      color: #000;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      padding: 14px 28px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s, opacity 0.2s;
    }
    .btn-primary:hover { transform: scale(1.04); opacity: 0.9; }

    .btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 15px;
      padding: 13px 28px;
      border-radius: 12px;
      border: 1px solid var(--c-border);
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .btn-outline:hover { border-color: #fff; background: rgba(255,255,255,0.05); }

    /* Project card color accents */
    .project-card { position: relative; overflow: hidden; }
    .project-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 16px 16px 0 0;
    }
    .accent-lime::before { background: linear-gradient(90deg, var(--c-lime), var(--c-cyan)); }
    .accent-pink::before { background: linear-gradient(90deg, var(--c-pink), var(--c-orange)); }
    .accent-purple::before { background: linear-gradient(90deg, var(--c-purple), var(--c-pink)); }
    .accent-orange::before { background: linear-gradient(90deg, var(--c-orange), var(--c-lime)); }

    /* Timeline */
    .timeline-dot {
      width: 14px; height: 14px;
      background: var(--c-lime);
      border-radius: 50%;
      border: 3px solid var(--c-dark);
      flex-shrink: 0;
      margin-top: 4px;
    }
    .timeline-line {
      width: 2px;
      background: linear-gradient(180deg, var(--c-lime), transparent);
      flex-shrink: 0;
      margin: 0 6px;
    }

    /* Divider */
    .divider { width: 100%; height: 1px; background: var(--c-border); margin: 80px 0; }

    /* Mobile menu */
    .mobile-menu {
      position: fixed;
      inset: 0;
      background: rgba(10,10,15,0.98);
      backdrop-filter: blur(20px);
      z-index: 90;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
    }
    .mobile-menu a {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      transition: color 0.2s;
    }
    .mobile-menu a:hover { color: var(--c-lime); }

    section { position: relative; z-index: 1; }

    /* Responsive helpers */
    @media (max-width: 768px) {
      .hero-heading { font-size: 2.8rem !important; }
    }
  </style>
</head>

function HeroSection() {

              {typed}<span className="cursor-blink" style={{color:'var(--c-lime)'}}>|</span>
            </div>
            <p className="opacity-0-start fade-up delay-3" style={{fontSize:'16px',lineHeight:1.8,color:'rgba(255,255,255,0.55)',maxWidth:'560px',marginBottom:'40px'}}>
              I build scalable web applications, AI-powered systems, and automation tools.

function App() {
  const [activeSection, setActiveSection] = useState('about');

  useEffect(()=>{
    const handler = ()=>{
      const sections = NAV_LINKS.map(l=>document.getElementById(l.toLowerCase())).filter(Boolean);
      const scrollY = window.scrollY + 100;
      for(let i=sections.length-1;i>=0;i--){
        if(scrollY >= sections[i].offsetTop){ setActiveSection(sections[i].id); break; }
      }
    };
    window.addEventListener('scroll',handler,{passive:true});
    return ()=>window.removeEventListener('scroll',handler);
  },[]);

  return (
    <div>
      <Nav active={activeSection} />
      <HeroSection />
      <MarqueeBar />
      <SkillsSection />
      <ProjectsSection />
      <ExperienceSection />
      <ContactSection />
      <Footer />
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
